name: release

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.3). Required for workflow_dispatch.'
        required: true

jobs:
  publish-crate:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish crate (skip if version already exists)
        shell: bash
        run: |
          set -euo pipefail
          CRATE_NAME="$(sed -n 's/^name = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          CRATE_VERSION="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          if [ -z "$CRATE_NAME" ] || [ -z "$CRATE_VERSION" ]; then
            echo "Could not parse crate name/version from Cargo.toml"
            exit 1
          fi

          STATUS_CODE="$(curl -sS -o /dev/null -w "%{http_code}" "https://crates.io/api/v1/crates/${CRATE_NAME}/${CRATE_VERSION}" || true)"
          if [ "$STATUS_CODE" = "200" ]; then
            echo "${CRATE_NAME} ${CRATE_VERSION} already exists on crates.io; skipping publish."
            exit 0
          fi

          cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  build-binaries:
    if: startsWith(github.ref, 'refs/tags/v')
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            bin_ext: ''
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
            bin_ext: ''
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
            bin_ext: ''
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            bin_ext: .exe

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          BIN="autogitignore${{ matrix.bin_ext }}"
          ASSET="autogitignore-${VERSION}-${{ matrix.target }}"
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${BIN}" "dist/${BIN}"
          cp README.md LICENSE dist/
          tar -C dist -czf "${ASSET}.tar.gz" "${BIN}" README.md LICENSE

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${env:GITHUB_REF_NAME}"
          $bin = "autogitignore${{ matrix.bin_ext }}"
          $asset = "autogitignore-$version-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/$bin" "dist/$bin"
          Copy-Item README.md dist/README.md
          Copy-Item LICENSE dist/LICENSE
          Compress-Archive -Path dist/$bin, dist/README.md, dist/LICENSE -DestinationPath "$asset.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: autogitignore-${{ matrix.target }}
          path: |
            *.tar.gz
            *.zip

  create-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-binaries
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true

  update-homebrew-tap:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - create-release
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS and Linux build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Compute SHA256 checksums
        id: sha
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          sha_arm=$(sha256sum "release-assets/autogitignore-${VERSION}-aarch64-apple-darwin.tar.gz" | awk '{print $1}')
          sha_intel=$(sha256sum "release-assets/autogitignore-${VERSION}-x86_64-apple-darwin.tar.gz" | awk '{print $1}')
          sha_linux=$(sha256sum "release-assets/autogitignore-${VERSION}-x86_64-unknown-linux-gnu.tar.gz" | awk '{print $1}')

          echo "sha_arm=${sha_arm}" >> "$GITHUB_OUTPUT"
          echo "sha_intel=${sha_intel}" >> "$GITHUB_OUTPUT"
          echo "sha_linux=${sha_linux}" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew tap
        uses: actions/checkout@v4
        with:
          repository: Bilal-AKAG/homebrew-autogitignore
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula version and SHA256
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.sha.outputs.version }}"
          SHA_ARM="${{ steps.sha.outputs.sha_arm }}"
          SHA_INTEL="${{ steps.sha.outputs.sha_intel }}"
          SHA_LINUX="${{ steps.sha.outputs.sha_linux }}"
          FORMULA="homebrew-tap/Formula/autogitignore.rb"

          # Update version
          sed -i "s/version \"[^\"]*\"/version \"${VERSION#v}\"/" "$FORMULA"

          # Update SHA256 values per architecture (order: Intel, ARM, Linux)
          # We use a Python script for reliable multi-line ruby DSL editing
          python3 - "$FORMULA" "$SHA_INTEL" "$SHA_ARM" "$SHA_LINUX" <<'PYEOF'
          import sys, re

          formula_path, sha_intel, sha_arm, sha_linux = sys.argv[1:]
          content = open(formula_path).read()

          # Replace SHA256 inside on_intel / on_arm / on_linux blocks
          def replace_sha(text, block_marker, new_sha):
              pattern = rf'({re.escape(block_marker)}.*?sha256 ")[0-9a-f]{{64}}(")'  
              return re.sub(pattern, rf'\g<1>{new_sha}\2', text, count=1, flags=re.DOTALL)

          content = replace_sha(content, 'on_intel do', sha_intel)
          content = replace_sha(content, 'on_arm do',   sha_arm)
          content = replace_sha(content, 'on_linux do', sha_linux)

          open(formula_path, 'w').write(content)
          print('Formula updated successfully.')
          PYEOF

      - name: Commit and push formula update
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.sha.outputs.version }}"
          cd homebrew-tap
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/autogitignore.rb
          git diff --cached --quiet && { echo "Formula already up-to-date."; exit 0; }
          git commit -m "chore: update autogitignore to ${VERSION}"
          git push
